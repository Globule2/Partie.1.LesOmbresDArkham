description.French=<i>Des lettres énigmatiques, écrites par une femme mystérieuse, vous ont conduit jusqu’à Arkham. Chaque mot y est voilé, laissant entrevoir des secrets anciens et des horreurs indicibles. Votre mission est claire : retrouver Robert Olmstead, disparu depuis des années et dont le retour semble lié à des forces que nul esprit humain ne devrait affronter. Dans les ruelles étroites, les marchés nauséabonds et les caves obscures, chaque pas vous rapproche de la vérité… ou de la folie.</i>\n\nUne aventure faite pour Les Demeures de l'Épouvante, 2nd édition. Pas de contenu additionnel nécessaire.\n
